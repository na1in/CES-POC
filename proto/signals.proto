syntax = "proto3";

package ces.payment_resolution;

option java_package = "com.ces.payment_resolution";
option go_package = "ces/payment_resolution";

import "google/protobuf/timestamp.proto";
import "proto/customer.proto";

// Quality of payment timing relative to due date.
enum PaymentTimingQuality {
  PAYMENT_TIMING_QUALITY_UNSPECIFIED = 0;
  PAYMENT_TIMING_QUALITY_EXCELLENT = 1;
  PAYMENT_TIMING_QUALITY_GOOD = 2;
  PAYMENT_TIMING_QUALITY_ACCEPTABLE = 3;
  PAYMENT_TIMING_QUALITY_POOR = 4;
}

// Account status used in risk signal evaluation.
enum AccountStatus {
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  ACCOUNT_STATUS_ACTIVE = 1;
  ACCOUNT_STATUS_INACTIVE = 2;
  ACCOUNT_STATUS_CLOSED = 3;
}

// Risk level derived from payment method.
// ACH/Card = Low, Check/Wire = Medium, Unknown = High.
enum PaymentMethodRiskLevel {
  PAYMENT_METHOD_RISK_LEVEL_UNSPECIFIED = 0;
  PAYMENT_METHOD_RISK_LEVEL_LOW = 1;       // ACH, Card
  PAYMENT_METHOD_RISK_LEVEL_MEDIUM = 2;    // Check, Wire
  PAYMENT_METHOD_RISK_LEVEL_HIGH = 3;      // Unknown / unrecognized method
}

// All computed feature signals for a payment (1-to-1 with Payment).
message PaymentSignals {
  // References Payment.payment_id.
  string payment_id = 1;

  google.protobuf.Timestamp computed_at = 2;

  // --- Matching signals ---
  MatchingSignals matching = 3;

  // --- Amount signals ---
  AmountSignals amount = 4;

  // --- Temporal signals ---
  TemporalSignals temporal = 5;

  // --- Risk signals ---
  RiskSignals risk = 6;

  // --- Duplicate signals ---
  DuplicateSignals duplicate = 7;
}

// Signals related to identity and policy matching.
message MatchingSignals {
  // 0-100 final name similarity score (max of deterministic and LLM if gray zone).
  double name_similarity_score = 1;

  // 0-100 confidence that the correct policy was identified.
  double policy_match_confidence = 2;

  // 0-100 confidence that the correct customer was identified.
  double customer_match_confidence = 3;

  // Account number matches a historically used account.
  bool account_match = 4;

  // Amount matches expected premium.
  bool amount_match = 5;

  // Payment pattern matches historical behavior.
  bool historical_match = 6;

  // --- Name matching algorithm breakdown (for Damien's algorithmic provenance) ---

  // Raw Jaro-Winkler similarity score (0-100).
  double jaro_winkler_score = 7;

  // Raw Levenshtein-based similarity score (0-100).
  double levenshtein_score = 8;

  // Whether Soundex codes matched.
  bool soundex_match = 9;

  // Combined deterministic score before any LLM call (0-100).
  double deterministic_score = 10;

  // Whether the gray-zone LLM call was made (score was between 70-92%).
  bool used_llm = 11;

  // Claude Haiku score if called (0-100). 0 if used_llm = false.
  double llm_score = 12;
}

// Signals related to payment amount analysis.
message AmountSignals {
  // Percentage variance from expected premium.
  double amount_variance_pct = 1;

  bool is_overpayment = 2;

  bool is_underpayment = 3;

  // Dollar difference from expected (in cents).
  int64 difference_amount = 4;

  // Payment equals N x premium (prepayment: e.g., $15,000 for $5,000/mo = 3 periods).
  bool is_multi_period = 5;

  // Number of periods covered (0 if not applicable).
  int32 estimated_periods = 6;

  // 0-100 consistency with historical payment amounts.
  double historical_consistency_score = 7;

  // Payment is a fraction of expected premium, suggesting the customer is splitting
  // the total across multiple payments/methods (e.g., $2,500 x 3 for $7,500 premium).
  bool is_multi_method = 8;

  // If multi-method detected, what fraction of the premium this payment represents.
  // e.g., $2,500 of $7,500 = 0.333
  double multi_method_fraction = 9;

  // Whether the sender differs from the policyholder (third-party payment).
  // Common: family member, employer payroll, mortgage escrow company.
  bool is_third_party_payment = 10;

  // Relationship of third-party sender if detected (e.g., "employer", "family", "escrow").
  string third_party_relationship = 11;
}

// Signals related to payment timing.
message TemporalSignals {
  PaymentTimingQuality payment_timing_quality = 1;

  // Positive = after due date, negative = before.
  int32 days_from_due_date = 2;

  int32 days_since_last_payment = 3;
}

// Signals related to risk evaluation.
message RiskSignals {
  bool has_risk_flags = 1;

  // List of specific risk flag types present.
  repeated RiskFlagType risk_flag_types = 2;

  AccountStatus account_status = 3;

  // Risk level derived from payment method (ACH/Card=Low, Check/Wire=Medium, Unknown=High).
  PaymentMethodRiskLevel payment_method_risk_level = 4;

  // Outstanding balance on the matched policy at time of payment (cents).
  int64 outstanding_balance_cents = 5;

  // Whether the balance is current or past due.
  string outstanding_balance_status = 6;  // "current" or "past_due"
}

// Signals related to duplicate payment detection.
message DuplicateSignals {
  // Match found (3 exact fields + amount within $2 tolerance).
  bool is_duplicate_match = 1;

  // Reference to the original payment (empty if no duplicate).
  string duplicate_payment_id = 2;

  // Hours between this payment and the suspected duplicate.
  double hours_since_duplicate = 3;

  // Outstanding balance exists to justify a second payment.
  bool outstanding_balance_justifies = 4;

  // Absolute amount difference between this and suspected duplicate (in cents).
  // 0 = exact match, up to 200 ($2.00) = within tolerance.
  int64 duplicate_amount_difference = 5;
}
