services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ces
      POSTGRES_USER: ces_user
      POSTGRES_PASSWORD: ces_password
    ports:
      - "5432:5432"
    volumes:
      - ces_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ces_user -d ces"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ces_pgdata:
