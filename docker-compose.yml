services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ces
      POSTGRES_USER: ces_user
      POSTGRES_PASSWORD: ces_password
    ports:
      - "5432:5432"
    volumes:
      - ces_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ces_user -d ces"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ces_user:ces_password@db:5432/ces
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  ces_pgdata:
